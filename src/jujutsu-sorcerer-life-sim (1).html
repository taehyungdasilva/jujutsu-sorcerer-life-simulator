<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jujutsu Sorcerer Life Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14131c; --panel: #1c1a26; --panel-2: #24212f; --line: #34303f;
    --bone: #ece7da; --dim: #9b96ab; --purple: #8a6bff; --purple-dim: #4b3f8a;
    --red: #d6555a; --teal: #3fae8c; --gold: #c9a227;
    --display: 'Shippori Mincho', serif; --body: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:transparent; color:var(--bone); font-family:var(--body); font-size:15px; }
  #app{ max-width:940px; margin:0 auto; padding:24px 16px 60px; }
  .brushline{ height:2px; background:linear-gradient(90deg, transparent, var(--purple), transparent); opacity:.6; margin:18px 0; }
  header{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:8px; }
  .titleblock h1{ font-family:var(--display); font-weight:800; font-size:24px; margin:0; letter-spacing:.5px; }
  .titleblock .sub{ color:var(--dim); font-size:12.5px; margin-top:2px; }
  .seal{ width:56px; height:56px; border-radius:6px; border:2px solid var(--red); display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--red); font-family:var(--display); font-weight:800; font-size:11px; line-height:1.1; text-align:center; transform:rotate(-3deg); flex-shrink:0; }
  .seal b{ font-size:20px; font-family:var(--mono); }
  .grid{ display:grid; grid-template-columns: 230px 1fr; gap:20px; margin-top:18px; }
  @media (max-width:680px){ .grid{ grid-template-columns:1fr; } }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .panel h3{ font-family:var(--display); font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); margin:0 0 12px; }
  .stat{ margin-bottom:10px; }
  .stat .row{ display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:4px; color:var(--dim); }
  .stat .row b{ color:var(--bone); font-family:var(--mono); font-weight:600; }
  .bar{ height:6px; border-radius:3px; background:var(--panel-2); overflow:hidden; }
  .bar > div{ height:100%; border-radius:3px; }
  .fill-p{ background:var(--purple); } .fill-b{ background:var(--red); } .fill-m{ background:var(--teal); } .fill-s{ background:var(--gold); }
  .statgroup-label{ font-family:var(--mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--purple); margin:14px 0 8px; }
  .statgroup-label:first-child{ margin-top:0; }
  #log{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px 20px; min-height:260px; max-height:440px; overflow-y:auto; font-size:14.5px; line-height:1.65; }
  #log p{ margin:0 0 12px; }
  #log .day-mark{ color:var(--gold); font-family:var(--mono); font-size:11.5px; letter-spacing:1px; text-transform:uppercase; margin:18px 0 6px; }
  #log .danger{ color:var(--red); } #log .good{ color:var(--teal); } #log .muted{ color:var(--dim); font-size:13px; }
  #log .mentor{ color:var(--purple); font-style:italic; }
  .actions{ margin-top:16px; }
  .slot-label{ font-family:var(--mono); font-size:11.5px; color:var(--dim); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
  .btnrow{ display:flex; flex-wrap:wrap; gap:8px; }
  button{ font-family:var(--body); font-size:13.5px; font-weight:500; color:var(--bone); background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:10px 14px; cursor:pointer; transition:border-color .15s, transform .1s; }
  button:hover{ border-color:var(--purple); } button:active{ transform:scale(.97); }
  button.primary{ background:var(--purple-dim); border-color:var(--purple); }
  button.danger{ background:#3a1f22; border-color:var(--red); }
  button:disabled{ opacity:.35; cursor:not-allowed; }
  .center{ text-align:center; }
  .formrow{ margin-bottom:16px; }
  .formrow label{ display:block; font-size:12px; color:var(--dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
  input[type=text]{ width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:10px 12px; color:var(--bone); font-family:var(--body); font-size:14px; }
  .origin-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:560px){ .origin-grid{ grid-template-columns:1fr; } }
  .origin-card{ text-align:left; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:12px; cursor:pointer; }
  .origin-card.selected{ border-color:var(--purple); background:var(--purple-dim); }
  .origin-card b{ display:block; font-family:var(--display); font-size:14px; margin-bottom:4px; }
  .origin-card span{ font-size:12px; color:var(--dim); }
  .legacy-item{ border-bottom:1px solid var(--line); padding:10px 0; font-size:13px; }
  .legacy-item:last-child{ border-bottom:none; }
  .legacy-item .name{ font-family:var(--display); font-weight:700; }
  .legacy-item .meta{ color:var(--dim); font-size:11.5px; }
  .mission-card{ background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:14px; margin:10px 0; font-size:13.5px; }
  .mission-card .k{ color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:1px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY_LEGACY = 'legacy-records';
const STORAGE_KEY_RUN = 'current-run';

const ORIGINS = {
  restricao_celestial: {
    name: 'Restrição Celestial',
    desc: 'Corpo perfeito, quase nenhuma energia amaldiçoada. Você vive de reflexo e instinto, não de técnica.',
    stats: { forca:70, velocidade:65, reservas:8, controle:15, intelecto:35, resolucao:45 },
    growth: { forca:1.3, velocidade:1.3, reservas:0.25, controle:0.5, intelecto:1.0, resolucao:1.1 }
  },
  vaso_sukuna: {
    name: 'Vaso do Sukuna',
    desc: 'Reservas fora do normal, potencial aterrorizante — e um risco constante de perder o controle.',
    stats: { forca:40, velocidade:35, reservas:60, controle:25, intelecto:30, resolucao:20 },
    growth: { forca:1.0, velocidade:1.0, reservas:1.4, controle:0.9, intelecto:1.0, resolucao:0.75 }
  },
  genio: {
    name: 'Gênio',
    desc: 'Aprende mais rápido que qualquer colega. Entende teoria antes de ser ensinado.',
    stats: { forca:35, velocidade:35, reservas:35, controle:45, intelecto:55, resolucao:40 },
    growth: { forca:1.05, velocidade:1.05, reservas:1.1, controle:1.25, intelecto:1.3, resolucao:1.1 }
  },
  despertar_tardio: {
    name: 'Despertar Tardio',
    desc: 'Começa muito atrás dos colegas. Mas quando floresce, ultrapassa todo mundo.',
    stats: { forca:25, velocidade:25, reservas:25, controle:20, intelecto:35, resolucao:50 },
    growth: { forca:1.35, velocidade:1.3, reservas:1.35, controle:1.3, intelecto:1.2, resolucao:1.2 }
  },
  reservas_anormais: {
    name: 'Reservas Anormais',
    desc: 'Energia amaldiçoada em uma escala absurda. Controlá-la é outra história.',
    stats: { forca:35, velocidade:30, reservas:70, controle:12, intelecto:30, resolucao:30 },
    growth: { forca:1.0, velocidade:1.0, reservas:1.15, controle:0.6, intelecto:1.0, resolucao:0.95 }
  }
};

const MENTORS = {
  gojo: { name:'Gojo', lines:[
    'Gojo interrompe o treino para levar todos comprar doces. "Força de vontade também se treina, sabia?"',
    '"Domínio não é sobre poder. É sobre certeza absoluta." Gojo observa você com um interesse incomum.',
    'Gojo desvia sua pergunta com uma piada, mas depois corrige sua postura em silêncio.'
  ], stat:'reservas' },
  nanami: { name:'Nanami', lines:[
    'Nanami analisa seu desempenho com frieza. "Hora extra é para emergências. Isto não era uma."',
    'Depois da sessão, Nanami compra pão para os dois sem dizer uma palavra sobre o motivo.',
    'Nanami corrige seu raciocínio tático com uma pergunta simples que você não sabe responder.'
  ], stat:'resolucao' },
  shoko: { name:'Shoko', lines:[
    'Shoko te deixa observar uma Técnica de Reversão de Maldição de perto. "Não fume perto de feridas abertas."',
    'Shoko trata seus ferimentos enquanto comenta, sem rodeios, o que você fez de errado na missão.',
    '"Cura também é entender o corpo," diz Shoko, ensinando um princípio que você não esperava aprender hoje.'
  ], stat:'controle' },
  maki: { name:'Maki', lines:[
    'Maki te empurra além do limite no treino com arma. "Talento é desculpa de quem não quer suar."',
    'Maki não poupa críticas ao seu estilo, mas corrige sua guarda pessoalmente, mais de uma vez.',
    'Depois de um treino brutal, Maki simplesmente diz: "Melhorou." Vindo dela, isso é muito.'
  ], stat:'forca' },
  todo: { name:'Todo', lines:[
    'Todo pergunta seu tipo de pessoa antes mesmo de perguntar seu nome. Sua resposta parece importar mais do que deveria.',
    '"Black Flash não é sorte. É seu coração e seu punho concordando no mesmo instante," Todo explica, batendo no seu ombro.',
    'Todo grita instruções de combate que soam absurdas — até funcionarem.'
  ], stat:'velocidade' }
};

const CLASS_EVENTS = [
  { txt:'Aula teórica sobre Barreiras de Deslocamento. Você mal consegue acompanhar a lousa.', stat:'intelecto', gain:2 },
  { txt:'Um colega zomba da sua técnica na frente da turma. Dói mais do que devia.', stat:'resolucao', gain:1 },
  { txt:'Prova surpresa sobre hierarquia de graus de maldição. Você se sai melhor do que esperava.', stat:'intelecto', gain:3 },
  { txt:'Um momento bobo no intervalo — alguém derruba comida no uniforme de outra pessoa e todos riem.', stat:'resolucao', gain:2 },
  { txt:'Um rival da sua turma comenta seus recordes recentes com um tom que soa mais a desafio que elogio.', stat:'resolucao', gain:2 },
  { txt:'Você e um colega ficam até tarde discutindo teoria de energia amaldiçoada, cada um discordando do outro.', stat:'intelecto', gain:2 }
];

const TRAIN_FLAVOR = {
  forca: ['Reforço Físico até os músculos tremerem.', 'Você repete o mesmo golpe centenas de vezes, buscando consistência.'],
  velocidade: ['Sessão de reação e deslocamento rápido.', 'Você treina esquivas até a respiração falhar.'],
  reservas: ['Meditação prolongada para expandir sua percepção de energia amaldiçoada.', 'Você tenta manter fluxo constante de energia por horas.'],
  controle: ['Exercícios de controle fino de energia amaldiçoada — a diferença entre desperdiçar e dominar.', 'Você pratica conter energia amaldiçoada sem deixá-la vazar.'],
  intelecto: ['Estudo teórico sobre técnicas e amaldiçoamento.', 'Você analisa registros de missões antigas em busca de padrões.'],
  resolucao: ['Você se força a encarar memórias desconfortáveis, treinando a mente tanto quanto o corpo.', 'Meditação mental para lidar com o peso do trabalho de exorcista.']
};

const STAT_LABELS = { forca:'Força', velocidade:'Velocidade', reservas:'Reservas de EA', controle:'Controle de EA', intelecto:'Intelecto', resolucao:'Resolução' };

const MISSION_LOCATIONS = [
  { place:'Hospital abandonado', civilians:2 },
  { place:'Túnel do metrô interditado', civilians:0 },
  { place:'Escola primária após o horário', civilians:4 },
  { place:'Complexo de apartamentos antigo', civilians:1 },
  { place:'Floresta nos arredores da cidade', civilians:0 },
  { place:'Mercado noturno fechado', civilians:3 }
];

let state = null;

function freshRun(name, originKey){
  const o = ORIGINS[originKey];
  return {
    name, originKey, day:1, slot:0,
    stats: { ...o.stats }, stress:20, energy:100, alive:true, log:[], causeOfDeath:null,
    missionsCompleted:0, civiliansSaved:0, gradesDefeated:0, mentorAffinity:{gojo:0,nanami:0,shoko:0,maki:0,todo:0},
    pendingMission:null
  };
}

function clamp(v, min=0, max=100){ return Math.max(min, Math.min(max, v)); }
function addLog(html){ state.log.push(html); }
function dayMark(){
  const slotNames=['Manhã','Tarde','Noite'];
  addLog(`<div class="day-mark">Dia ${state.day} — ${slotNames[state.slot]}</div>`);
}
async function saveRun(){ try{ await window.storage.set(STORAGE_KEY_RUN, JSON.stringify(state)); }catch(e){} }
async function clearRun(){ try{ await window.storage.delete(STORAGE_KEY_RUN); }catch(e){} }
async function loadRun(){ try{ const r=await window.storage.get(STORAGE_KEY_RUN); return r?JSON.parse(r.value):null; }catch(e){ return null; } }
async function loadLegacy(){ try{ const r=await window.storage.get(STORAGE_KEY_LEGACY); return r?JSON.parse(r.value):[]; }catch(e){ return []; } }
async function addLegacy(entry){ const list=await loadLegacy(); list.unshift(entry); try{ await window.storage.set(STORAGE_KEY_LEGACY, JSON.stringify(list.slice(0,25))); }catch(e){} }

function advanceSlot(){
  state.slot++;
  if(state.slot>2){ state.slot=0; state.day++; }
  dayMark();
}

function growthGain(stat){
  const g = ORIGINS[state.originKey].growth[stat] || 1.0;
  return Math.round((2 + Math.random()*3) * g);
}

function doTrain(stat){
  const gain = growthGain(stat);
  state.stats[stat] = clamp(state.stats[stat] + gain);
  state.energy = clamp(state.energy - 18);
  state.stress = clamp(state.stress + 4);
  const flavor = TRAIN_FLAVOR[stat][Math.floor(Math.random()*TRAIN_FLAVOR[stat].length)];
  addLog(`<p>${flavor} <span class="good">+${gain} ${STAT_LABELS[stat]}</span>.</p>`);
  advanceSlot(); checkBurnout(); render();
}

function doMentorSession(){
  const keys = Object.keys(MENTORS);
  const key = keys[Math.floor(Math.random()*keys.length)];
  const m = MENTORS[key];
  const line = m.lines[Math.floor(Math.random()*m.lines.length)];
  const gain = growthGain(m.stat);
  state.stats[m.stat] = clamp(state.stats[m.stat] + gain);
  state.mentorAffinity[key] = (state.mentorAffinity[key]||0) + 1;
  state.energy = clamp(state.energy - 15);
  addLog(`<p class="mentor">${line}</p><p><span class="good">+${gain} ${STAT_LABELS[m.stat]}</span> · afinidade com ${m.name} cresce.</p>`);
  advanceSlot(); checkBurnout(); render();
}

function doClass(){
  const ev = CLASS_EVENTS[Math.floor(Math.random()*CLASS_EVENTS.length)];
  const gain = growthGain(ev.stat);
  state.stats[ev.stat] = clamp(state.stats[ev.stat] + gain);
  state.energy = clamp(state.energy - 8);
  addLog(`<p>${ev.txt} <span class="good">+${gain} ${STAT_LABELS[ev.stat]}</span>.</p>`);
  advanceSlot(); render();
}

function doRest(){
  const gain = 25 + Math.floor(Math.random()*10);
  state.energy = clamp(state.energy + gain);
  state.stress = clamp(state.stress - 15);
  addLog(`<p>Você descansa. A energia amaldiçoada se estabiliza. <span class="good">Energia +${gain}, Estresse -15</span>.</p>`);
  advanceSlot(); render();
}

function checkBurnout(){
  if(state.energy <= 5 && Math.random() < 0.3){
    const dmg = 8 + Math.floor(Math.random()*10);
    state.stats.forca = clamp(state.stats.forca - dmg);
    addLog(`<p class="danger">Exaustão. Seu corpo cede um pouco sob o esforço excessivo. -${dmg} Força.</p>`);
  }
}

function offerMission(){
  if(state.energy < 20){
    addLog(`<p class="muted">Você está fraco demais para sair em missão agora. Descanse primeiro.</p>`);
    render(); return;
  }
  const loc = MISSION_LOCATIONS[Math.floor(Math.random()*MISSION_LOCATIONS.length)];
  const gradeRoll = Math.random();
  const grade = gradeRoll > 0.92 ? 'Grau Especial' : gradeRoll > 0.7 ? 'Grau 1' : gradeRoll > 0.4 ? 'Grau 2' : 'Grau 3';
  state.pendingMission = { loc: loc.place, civilians: loc.civilians, grade };
  addLog(`<div class="mission-card">
    <div class="k">Missão recebida</div>
    <p><b>${loc.place}</b></p>
    <p class="k">Grau estimado: <b>${grade}</b> · Civis desaparecidos: <b>${loc.civilians}</b></p>
  </div>`);
  render();
}

function gradeValue(grade){
  return { 'Grau 3':30, 'Grau 2':50, 'Grau 1':75, 'Grau Especial':100 }[grade];
}

function prepareMission(mode){
  const m = state.pendingMission;
  let prepText, riskMod, rewardMod, energyCost;
  if(mode==='investigar'){ prepText='Você passa tempo reunindo informações antes de agir.'; riskMod=-15; rewardMod=1.0; energyCost=15; }
  else if(mode==='direto'){ prepText='Você vai direto ao local, sem preparação extra.'; riskMod=0; rewardMod=1.15; energyCost=25; }
  else { prepText='Você pede apoio de um mentor antes de sair.'; riskMod=-25; rewardMod=0.7; energyCost=20; }

  state.energy = clamp(state.energy - energyCost);
  addLog(`<p>${prepText}</p>`);

  const power = (state.stats.reservas*0.3 + state.stats.controle*0.3 + state.stats.forca*0.2 + state.stats.velocidade*0.2);
  const enemy = gradeValue(m.grade) + Math.floor(Math.random()*20) + riskMod;
  const roll = power + Math.random()*30 - state.stress*0.15;

  if(m.civilians > 0){
    addLog(`<div class="btnrow">
      <button onclick="missionChoice('resgatar', ${roll}, ${enemy}, ${rewardMod})">Priorizar resgatar civis</button>
      <button onclick="missionChoice('perseguir', ${roll}, ${enemy}, ${rewardMod})">Perseguir a maldição diretamente</button>
    </div>`);
    render();
  } else {
    resolveMission(roll, enemy, rewardMod, false);
  }
}

function missionChoice(choice, roll, enemy, rewardMod){
  const m = state.pendingMission;
  if(choice==='resgatar'){
    state.civiliansSaved += m.civilians;
    addLog(`<p class="good">Você prioriza os civis. Todos são encontrados a salvo, mas a maldição ganha tempo.</p>`);
    resolveMission(roll - 10, enemy, rewardMod*0.85, true);
  } else {
    addLog(`<p>Você ignora os gritos ao longe e vai direto atrás da maldição.</p>`);
    resolveMission(roll + 8, enemy, rewardMod, false);
  }
}

function resolveMission(roll, enemy, rewardMod, savedCivilians){
  const m = state.pendingMission;
  state.missionsCompleted++;

  if(roll > enemy + 10){
    const g = Math.round((3 + Math.random()*4) * rewardMod);
    state.stats.resolucao = clamp(state.stats.resolucao + g);
    state.gradesDefeated++;
    addLog(`<p class="good">Você exorciza a maldição de ${m.grade} sem grandes dificuldades. Confiança cresce (+${g} Resolução).</p>`);
  } else if(roll > enemy - 15){
    const dmg = Math.round((8 + Math.random()*15) / rewardMod);
    state.stats.forca = clamp(state.stats.forca - dmg);
    state.stress = clamp(state.stress + 10);
    state.gradesDefeated++;
    addLog(`<p>Combate difícil contra a maldição de ${m.grade}. Você vence, mas sai ferido. <span class="danger">-${dmg} Força, Estresse +10</span>.</p>`);
  } else {
    const dmg = Math.round((25 + Math.random()*30) / rewardMod);
    state.stats.forca = clamp(state.stats.forca - dmg);
    state.stress = clamp(state.stress + 20);
    addLog(`<p class="danger">A maldição de ${m.grade} era mais forte do que o esperado. Você quase não escapa. -${dmg} Força, Estresse +20.</p>`);
    if(state.stats.forca <= 0){ state.causeOfDeath = `Morto em combate contra uma maldição de ${m.grade} em ${m.loc}.`; }
  }

  state.pendingMission = null;
  if(state.stats.forca <= 0 && !state.causeOfDeath){ state.causeOfDeath = 'Corpo destruído após ferimentos acumulados.'; }
  if(state.causeOfDeath){ handleDeath(); return; }
  advanceSlot(); checkBurnout();
  if(state.stats.forca <= 0 && !state.causeOfDeath){ state.causeOfDeath='Colapso físico.'; handleDeath(); return; }
  render();
}

function earnTitle(){
  const affinities = state.mentorAffinity;
  const topMentor = Object.entries(affinities).sort((a,b)=>b[1]-a[1])[0];
  if(topMentor && topMentor[1] >= 4) return `Aluno favorito de ${MENTORS[topMentor[0]].name}`;
  if(state.civiliansSaved >= 6) return 'Protetor do povo';
  if(state.gradesDefeated >= 8) return 'Exorcista prolífico';
  if(state.day <= 30 && !state.alive) return 'Prodígio caído cedo demais';
  return 'Feiticeiro sem título — vida comum, mas vivida';
}

function handleDeath(){
  state.alive = false;
  addLog(`<p class="danger"><b>${state.name}</b> não sobreviveu. ${state.causeOfDeath}</p>`);
  const highest = Math.max(...Object.values(state.stats));
  const title = earnTitle();
  addLegacy({ name: state.name, origin: ORIGINS[state.originKey].name, daysSurvived: state.day, highestStat: highest, cause: state.causeOfDeath, missions: state.missionsCompleted, civiliansSaved: state.civiliansSaved, title });
  clearRun(); render();
}

async function startGame(name, originKey){
  state = freshRun(name, originKey);
  addLog(`<p><b>${name}</b> é admitido(a) na Escola de Jujutsu, carregando a marca de <b>${ORIGINS[originKey].name}</b>.</p>`);
  dayMark(); await saveRun(); render();
}

function renderCreation(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header><div class="titleblock"><h1>Jujutsu Sorcerer Life Simulator</h1><div class="sub">Crie seu feiticeiro</div></div></header>
    <div class="brushline"></div>
    <div class="panel">
      <div class="formrow"><label>Nome</label><input type="text" id="nameInput" placeholder="Nome do seu feiticeiro" maxlength="24"></div>
      <div class="formrow"><label>Origem</label><div class="origin-grid" id="originGrid"></div></div>
      <div class="center"><button class="primary" id="beginBtn" disabled>Começar a vida</button></div>
    </div>
    <div class="brushline"></div>
    <div class="panel" id="legacyPanel"><h3>Registros Históricos</h3><div id="legacyList" class="muted">Carregando...</div></div>
  `;
  let selectedOrigin = null;
  const grid = document.getElementById('originGrid');
  Object.entries(ORIGINS).forEach(([key,o])=>{
    const card = document.createElement('div');
    card.className='origin-card';
    card.innerHTML = `<b>${o.name}</b><span>${o.desc}</span>`;
    card.onclick = () => { selectedOrigin=key; document.querySelectorAll('.origin-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); checkReady(); };
    grid.appendChild(card);
  });
  const nameInput = document.getElementById('nameInput');
  const beginBtn = document.getElementById('beginBtn');
  function checkReady(){ beginBtn.disabled = !(nameInput.value.trim().length>0 && selectedOrigin); }
  nameInput.addEventListener('input', checkReady);
  beginBtn.onclick = () => startGame(nameInput.value.trim(), selectedOrigin);

  loadLegacy().then(list=>{
    const el = document.getElementById('legacyList');
    if(list.length===0){ el.innerHTML='<span class="muted">Nenhum feiticeiro entrou para a história ainda.</span>'; return; }
    el.className='';
    el.innerHTML = list.map(l=>`
      <div class="legacy-item">
        <div class="name">${l.name} <span class="meta">— ${l.origin}</span></div>
        <div class="meta">"${l.title}" · ${l.daysSurvived} dia(s) · ${l.missions||0} missões · ${l.civiliansSaved||0} civis salvos · ${l.cause}</div>
      </div>`).join('');
  });
}

function statRow(label, key, fillClass){
  return `<div class="stat"><div class="row"><span>${label}</span><b>${state.stats[key]}</b></div><div class="bar"><div class="${fillClass}" style="width:${state.stats[key]}%"></div></div></div>`;
}

function renderGame(){
  const app = document.getElementById('app');
  const slotNames=['Manhã','Tarde','Noite'];
  const inMission = !!state.pendingMission;
  app.innerHTML = `
    <header>
      <div class="titleblock"><h1>${state.name}</h1><div class="sub">${ORIGINS[state.originKey].name} · Dia ${state.day}, ${slotNames[state.slot]}</div></div>
      <div class="seal">DIA<b>${state.day}</b></div>
    </header>
    <div class="brushline"></div>
    <div class="grid">
      <div class="panel">
        <h3>Atributos</h3>
        <div class="statgroup-label">Físico</div>
        ${statRow('Força','forca','fill-b')}
        ${statRow('Velocidade','velocidade','fill-b')}
        <div class="statgroup-label">Jujutsu</div>
        ${statRow('Reservas de EA','reservas','fill-p')}
        ${statRow('Controle de EA','controle','fill-p')}
        <div class="statgroup-label">Mental</div>
        ${statRow('Intelecto','intelecto','fill-m')}
        ${statRow('Resolução','resolucao','fill-m')}
        <div class="statgroup-label">Estado</div>
        <div class="stat"><div class="row"><span>Energia</span><b>${state.energy}</b></div><div class="bar"><div class="fill-m" style="width:${state.energy}%"></div></div></div>
        <div class="stat"><div class="row"><span>Estresse</span><b>${state.stress}</b></div><div class="bar"><div class="fill-s" style="width:${state.stress}%"></div></div></div>
      </div>
      <div>
        <div id="log">${state.log.join('')}</div>
        <div class="actions">
          ${inMission ? renderMissionPrep() : renderNormalActions(slotNames)}
        </div>
      </div>
    </div>
  `;
  const log = document.getElementById('log'); log.scrollTop = log.scrollHeight;
  saveRun();
}

function renderMissionPrep(){
  return `
    <div class="slot-label">Preparação da missão</div>
    <div class="btnrow">
      <button onclick="prepareMission('investigar')">Investigar antes</button>
      <button onclick="prepareMission('direto')">Ir direto</button>
      <button onclick="prepareMission('mentor')">Pedir apoio do mentor</button>
    </div>
  `;
}

function renderNormalActions(slotNames){
  const isMorning = state.slot===0;
  return `
    <div class="slot-label">Ação — ${slotNames[state.slot]}</div>
    <div class="btnrow">
      ${isMorning ? `<button onclick="doClass()">Ir à aula</button>` : ''}
      <button onclick="doTrain('forca')">Reforço Físico</button>
      <button onclick="doTrain('velocidade')">Treino de Reação</button>
      <button onclick="doTrain('reservas')">Meditação de EA</button>
      <button onclick="doTrain('controle')">Controle de EA</button>
      <button onclick="doTrain('intelecto')">Estudo Teórico</button>
      <button onclick="doMentorSession()">Sessão com Mentor</button>
      <button onclick="doRest()">Descansar</button>
      ${state.slot===1 ? `<button class="danger" onclick="offerMission()">Ir em missão</button>` : ''}
    </div>
  `;
}

function renderDeath(){
  const app = document.getElementById('app');
  const highest = Math.max(...Object.values(state.stats));
  const title = earnTitle();
  app.innerHTML = `
    <header>
      <div class="titleblock"><h1>${state.name}</h1><div class="sub">Fim de vida — Dia ${state.day}</div></div>
      <div class="seal" style="border-color:var(--red); color:var(--red);">☠<b style="font-size:14px">FIM</b></div>
    </header>
    <div class="brushline"></div>
    <div id="log">${state.log.join('')}</div>
    <div class="brushline"></div>
    <div class="panel">
      <h3>Resumo do Legado</h3>
      <p><b>Título:</b> "${title}"</p>
      <p><b>Origem:</b> ${ORIGINS[state.originKey].name}</p>
      <p><b>Dias vividos:</b> ${state.day}</p>
      <p><b>Missões completadas:</b> ${state.missionsCompleted}</p>
      <p><b>Civis salvos:</b> ${state.civiliansSaved}</p>
      <p><b>Pico de atributo:</b> ${highest}</p>
      <p><b>Causa da morte:</b> ${state.causeOfDeath}</p>
    </div>
    <div class="center" style="margin-top:16px;"><button class="primary" onclick="location.reload()">Começar uma nova vida</button></div>
  `;
}

function render(){
  if(!state){ renderCreation(); return; }
  if(!state.alive){ renderDeath(); return; }
  renderGame();
}

(async function init(){
  const existing = await loadRun();
  if(existing && existing.alive){ state = existing; }
  render();
})();
</script>
</body>
</html>
