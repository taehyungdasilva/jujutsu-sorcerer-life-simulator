<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jujutsu Sorcerer Life Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f16;
      --panel: #171723;
      --panel-2: #222131;
      --line: #34324b;
      --bone: #f3ebdb;
      --dim: #8d8aa6;
      --purple: #8f6dff;
      --purple-dim: #3f335b;
      --red: #d95861;
      --teal: #3fae8c;
      --gold: #c9a227;
      --display: 'Shippori Mincho', serif;
      --body: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #201d31 0%, var(--bg) 55%);
      color: var(--bone);
      font-family: var(--body);
      font-size: 15px;
    }

    #app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .screen {
      display: grid;
      gap: 18px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(23, 23, 35, 0.92);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.18);
    }

    .titleblock h1 {
      margin: 0;
      font-family: var(--display);
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .titleblock .sub {
      margin-top: 4px;
      color: var(--dim);
      font-size: 13px;
    }

    .seal {
      min-width: 72px;
      padding: 10px;
      border-radius: 10px;
      border: 2px solid var(--purple);
      text-align: center;
      color: var(--purple);
      font-family: var(--display);
      font-weight: 700;
      line-height: 1.1;
      transform: rotate(-3deg);
    }

    .seal b { font-family: var(--mono); font-size: 22px; display: block; margin-top: 3px; }

    .brushed {
      height: 2px;
      margin: 8px 0 2px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
      opacity: 0.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .panel h3 {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--dim);
      font-family: var(--display);
    }

    .stat-group { margin-bottom: 12px; }
    .stat-group-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--purple);
      margin: 8px 0 8px;
    }

    .stat-row { margin-bottom: 8px; }
    .stat-row .top {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 4px;
    }
    .stat-row .top b { color: var(--bone); font-family: var(--mono); font-size: 12px; }
    .bar { height: 6px; border-radius: 3px; background: var(--panel-2); overflow: hidden; }
    .bar > div { height: 100%; border-radius: 3px; }
    .fill-purple { background: var(--purple); }
    .fill-red { background: var(--red); }
    .fill-teal { background: var(--teal); }
    .fill-gold { background: var(--gold); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(143,109,255,0.14);
      color: var(--bone);
      font-size: 12px;
      border: 1px solid rgba(143,109,255,0.2);
      margin-top: 6px;
    }

    .log {
      min-height: 280px;
      max-height: 480px;
      overflow-y: auto;
      padding: 16px 18px;
      border-radius: 14px;
      background: rgba(23,23,35,0.88);
      border: 1px solid var(--line);
      line-height: 1.65;
      font-size: 14px;
    }
    .log p { margin: 0 0 10px; }
    .day-mark {
      margin: 16px 0 6px;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .danger { color: var(--red); }
    .good { color: var(--teal); }
    .muted { color: var(--dim); }
    .mentor { color: var(--purple); font-style: italic; }

    .actions { margin-top: 14px; }
    .slot-label {
      margin-bottom: 8px;
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .btnrow { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--bone);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.15s ease;
      font-family: var(--body);
    }
    button:hover { border-color: var(--purple); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.primary { background: var(--purple-dim); border-color: var(--purple); }
    button.danger { background: rgba(98, 30, 36, 0.84); border-color: var(--red); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .formrow { margin-bottom: 14px; }
    .formrow label {
      display: block;
      margin-bottom: 6px;
      color: var(--dim);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--bone);
      font-size: 14px;
      font-family: var(--body);
    }

    .origin-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    @media (max-width: 620px) { .origin-grid { grid-template-columns: 1fr; } }
    .origin-card {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      cursor: pointer;
      text-align: left;
    }
    .origin-card.selected { border-color: var(--purple); background: var(--purple-dim); }
    .origin-card b { display: block; font-family: var(--display); margin-bottom: 4px; }
    .origin-card span { color: var(--dim); font-size: 12px; }

    .legacy-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .legacy-item:last-child { border-bottom: none; }
    .legacy-item .name { font-family: var(--display); font-weight: 700; }
    .legacy-item .meta { color: var(--dim); font-size: 11.5px; margin-top: 3px; }

    .mission-card {
      background: rgba(143,109,255,0.12);
      border: 1px solid rgba(143,109,255,0.24);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .mission-card .k { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .center { text-align: center; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="./core/saveManager.js"></script>
  <script src="./state/gameStore.js"></script>
  <script>
    const STORAGE_NAMESPACE = 'jujutsu-sorcerer-life-simulator';
    const storageAdapter = (() => {
      if (typeof window !== 'undefined' && window.localStorage) {
        return {
          getItem(key) { return window.localStorage.getItem(key); },
          setItem(key, value) { window.localStorage.setItem(key, value); },
          removeItem(key) { window.localStorage.removeItem(key); }
        };
      }
      const data = new Map();
      return {
        getItem(key) { return data.has(key) ? data.get(key) : null; },
        setItem(key, value) { data.set(key, String(value)); },
        removeItem(key) { data.delete(key); }
      };
    })();

    const saveManager = createGameSaveManager(storageAdapter, STORAGE_NAMESPACE);
    const store = createGameStore({ view: 'creation', game: null, legacy: [] });

    const ORIGINS = {
      restricao_celestial: {
        name: 'Restrição Celestial',
        desc: 'Corpo perfeito, quase nenhuma energia amaldiçoada. Você vive de reflexo e instinto.',
        stats: { forca: 70, velocidade: 65, reservas: 8, controle: 15, intelecto: 35, resolucao: 45 },
        growth: { forca: 1.3, velocidade: 1.3, reservas: 0.25, controle: 0.5, intelecto: 1.0, resolucao: 1.1 }
      },
      vaso_sukuna: {
        name: 'Vaso do Sukuna',
        desc: 'Reservas fora do normal, potencial aterrorizante — e um risco constante de perder o controle.',
        stats: { forca: 40, velocidade: 35, reservas: 60, controle: 25, intelecto: 30, resolucao: 20 },
        growth: { forca: 1.0, velocidade: 1.0, reservas: 1.4, controle: 0.9, intelecto: 1.0, resolucao: 0.75 }
      },
      genio: {
        name: 'Gênio',
        desc: 'Aprende mais rápido que qualquer colega. Entende teoria antes de ser ensinado.',
        stats: { forca: 35, velocidade: 35, reservas: 35, controle: 45, intelecto: 55, resolucao: 40 },
        growth: { forca: 1.05, velocidade: 1.05, reservas: 1.1, controle: 1.25, intelecto: 1.3, resolucao: 1.1 }
      },
      despertar_tardio: {
        name: 'Despertar Tardio',
        desc: 'Começa muito atrás dos colegas, mas quando floresce ultrapassa todo mundo.',
        stats: { forca: 25, velocidade: 25, reservas: 25, controle: 20, intelecto: 35, resolucao: 50 },
        growth: { forca: 1.35, velocidade: 1.3, reservas: 1.35, controle: 1.3, intelecto: 1.2, resolucao: 1.2 }
      },
      reservas_anormais: {
        name: 'Reservas Anormais',
        desc: 'Energia amaldiçoada em uma escala absurda. Controlá-la é outra história.',
        stats: { forca: 35, velocidade: 30, reservas: 70, controle: 12, intelecto: 30, resolucao: 30 },
        growth: { forca: 1.0, velocidade: 1.0, reservas: 1.15, controle: 0.6, intelecto: 1.0, resolucao: 0.95 }
      }
    };

    const MENTORS = {
      gojo: { name: 'Gojo', lines: ['Gojo te dá um sorriso e muda sua postura com um comentário que parece brincadeira.', '"Domínio não é sobre poder. É sobre certeza absoluta."', 'Gojo interrompe o treino para levar todos comprar doces.'], stat: 'reservas' },
      nanami: { name: 'Nanami', lines: ['Nanami corrige seu raciocínio com uma pergunta simples e cruel.', 'Depois da sessão, Nanami compra pão para os dois sem dizer nada.', 'Nanami fala pouco, mas cada palavra pesa.'], stat: 'resolucao' },
      shoko: { name: 'Shoko', lines: ['Shoko te ensina a controlar seu corpo sob dor e desgaste.', '"Cura também é entender o corpo," ela diz.', 'Shoko te força a observar cada erro com frieza e precisão.'], stat: 'controle' },
      maki: { name: 'Maki', lines: ['Maki te obriga a treinar até o limite do corpo.', 'Ela não poupa críticas, mas corrige sua guarda pessoalmente.', 'Maki é rara em elogios, mas desta vez ela te chama de melhor.'], stat: 'forca' },
      todo: { name: 'Todo', lines: ['Todo grita instruções absurdas que, por algum motivo, funcionam.', '"Black Flash não é sorte. É vontade e precisão."', 'Todo te faz sentir que a própria velocidade pode virar arma.'], stat: 'velocidade' }
    };

    const CLASS_EVENTS = [
      { txt: 'Aula teórica sobre Barreiras de Deslocamento. Você mal consegue acompanhar a lousa.', stat: 'intelecto', gain: 2 },
      { txt: 'Um colega zomba da sua técnica. Dói mais do que devia.', stat: 'resolucao', gain: 1 },
      { txt: 'Prova surpresa sobre hierarquia de graus de maldição. Você se sai melhor do que esperava.', stat: 'intelecto', gain: 3 },
      { txt: 'Há um momento bobo no intervalo. Todos riem, e você aprende a sorrir mesmo com o peso do dia.', stat: 'resolucao', gain: 2 },
      { txt: 'Um rival da sua turma comenta seus recordes recentes com um tom que soa mais a desafio que elogio.', stat: 'resolucao', gain: 2 },
      { txt: 'Você e um colega discutem teoria de energia amaldiçoada até tarde.', stat: 'intelecto', gain: 2 }
    ];

    const TRAIN_FLAVOR = {
      forca: ['Reforço físico até os músculos tremerem.', 'Você repete o mesmo golpe centenas de vezes.'],
      velocidade: ['Sessão de reação e deslocamento rápido.', 'Você treina esquivas até a respiração falhar.'],
      reservas: ['Meditação prolongada para expandir a percepção de energia amaldiçoada.', 'Você tenta manter fluxo constante de energia por horas.'],
      controle: ['Exercícios de controle fino de energia amaldiçoada.', 'Você pratica conter energia sem deixá-la vazar.'],
      intelecto: ['Estudo teórico sobre técnicas e amaldiçoamento.', 'Você analisa registros de missões antigas em busca de padrões.'],
      resolucao: ['Você treina a mente para carregar o peso do trabalho de exorcista.', 'Meditação mental para suportar o que você vê.']
    };

    const STAT_LABELS = { forca: 'Força', velocidade: 'Velocidade', reservas: 'Reservas de EA', controle: 'Controle de EA', intelecto: 'Intelecto', resolucao: 'Resolução' };
    const INJURY_TEMPLATES = [
      { name: 'Rasgo muscular', severity: 10, description: 'Seu corpo cede sob o esforço excessivo.', remainingDays: 2 },
      { name: 'Lesão de impacto', severity: 14, description: 'A luta deixou marcas visíveis e dolorosas.', remainingDays: 3 },
      { name: 'Exaustão acumulada', severity: 8, description: 'Você precisa de descanso antes de tentar novamente.', remainingDays: 1 }
    ];
    const MISSION_LOCATIONS = [
      { place: 'Hospital abandonado', civilians: 2 },
      { place: 'Túnel do metrô interditado', civilians: 0 },
      { place: 'Escola primária após o horário', civilians: 4 },
      { place: 'Complexo de apartamentos antigo', civilians: 1 },
      { place: 'Floresta nos arredores da cidade', civilians: 0 },
      { place: 'Mercado noturno fechado', civilians: 3 }
    ];

    let state = null;
    let legacyList = [];

    function syncStore() {
      store.setState({
        view: !state ? 'creation' : (!state.alive ? 'death' : 'game'),
        game: state,
        legacy: legacyList
      });
    }

    function freshRun(name, originKey) {
      const origin = ORIGINS[originKey];
      return {
        name,
        originKey,
        day: 1,
        slot: 0,
        stats: { ...origin.stats },
        stress: 20,
        energy: 100,
        health: 100,
        injuries: [],
        alive: true,
        log: [],
        causeOfDeath: null,
        missionsCompleted: 0,
        civiliansSaved: 0,
        gradesDefeated: 0,
        mentorAffinity: { gojo: 0, nanami: 0, shoko: 0, maki: 0, todo: 0 },
        pendingMission: null
      };
    }

    function clamp(v, min = 0, max = 100) { return Math.max(min, Math.min(max, v)); }
    function addLog(html) { state.log.push(html); }
    function dayMark() { const slotNames = ['Manhã', 'Tarde', 'Noite']; addLog(`<div class="day-mark">Dia ${state.day} — ${slotNames[state.slot]}</div>`); }

    function applyInjury(definition) {
      const template = definition || INJURY_TEMPLATES[Math.floor(Math.random() * INJURY_TEMPLATES.length)];
      state.health = clamp((state.health || 100) - (template.severity || 0));
      state.injuries = [...(state.injuries || []), {
        id: `injury-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        name: template.name,
        severity: template.severity,
        description: template.description,
        remainingDays: template.remainingDays || 1
      }];
      addLog(`<p class="danger">Lesão recebida: ${template.name}. ${template.description} <span class="danger">- ${template.severity} Saúde</span>.</p>`);
    }

    function advanceInjuries() {
      state.injuries = (state.injuries || [])
        .map((injury) => ({ ...injury, remainingDays: injury.remainingDays - 1 }))
        .filter((injury) => injury.remainingDays > 0);
    }

    function healInjuries() {
      state.health = clamp((state.health || 100) + 12);
      addLog(`<p class="good">Você descansa e trata seus ferimentos. <span class="good">+12 Saúde</span>.</p>`);
    }
    async function saveRun() { try { saveManager.saveState('run', state); } catch (error) {} }
    async function clearRun() { try { saveManager.clearState('run'); } catch (error) {} }
    async function loadRun() { try { return saveManager.loadState('run'); } catch (error) { return null; } }
    async function loadLegacy() { try { return saveManager.loadState('legacy') || []; } catch (error) { return []; } }
    async function addLegacy(entry) { const list = await loadLegacy(); list.unshift(entry); try { saveManager.saveState('legacy', list.slice(0, 20)); } catch (error) {} }

    function advanceSlot() {
      state.slot += 1;
      if (state.slot > 2) {
        state.slot = 0;
        state.day += 1;
      }
      dayMark();
    }

    function growthGain(stat) {
      const growth = ORIGINS[state.originKey].growth[stat] || 1.0;
      return Math.round((2 + Math.random() * 3) * growth);
    }

    function doTrain(stat) {
      const gain = growthGain(stat);
      state.stats[stat] = clamp(state.stats[stat] + gain);
      state.energy = clamp(state.energy - 18);
      state.stress = clamp(state.stress + 4);
      const flavor = TRAIN_FLAVOR[stat][Math.floor(Math.random() * TRAIN_FLAVOR[stat].length)];
      addLog(`<p>${flavor} <span class="good">+${gain} ${STAT_LABELS[stat]}</span>.</p>`);
      if (stat === 'forca' && Math.random() < 0.25) {
        applyInjury(INJURY_TEMPLATES[0]);
      }
      advanceSlot(); checkBurnout(); render();
    }

    function doMentorSession() {
      const keys = Object.keys(MENTORS);
      const key = keys[Math.floor(Math.random() * keys.length)];
      const mentor = MENTORS[key];
      const line = mentor.lines[Math.floor(Math.random() * mentor.lines.length)];
      const gain = growthGain(mentor.stat);
      state.stats[mentor.stat] = clamp(state.stats[mentor.stat] + gain);
      state.mentorAffinity[key] = (state.mentorAffinity[key] || 0) + 1;
      state.energy = clamp(state.energy - 15);
      addLog(`<p class="mentor">${line}</p><p><span class="good">+${gain} ${STAT_LABELS[mentor.stat]}</span> · afinidade com ${mentor.name} cresce.</p>`);
      if (Math.random() < 0.2) {
        applyInjury(INJURY_TEMPLATES[1]);
      }
      advanceSlot(); checkBurnout(); render();
    }

    function doClass() {
      const ev = CLASS_EVENTS[Math.floor(Math.random() * CLASS_EVENTS.length)];
      const gain = growthGain(ev.stat);
      state.stats[ev.stat] = clamp(state.stats[ev.stat] + gain);
      state.energy = clamp(state.energy - 8);
      addLog(`<p>${ev.txt} <span class="good">+${gain} ${STAT_LABELS[ev.stat]}</span>.</p>`);
      advanceSlot(); render();
    }

    function doRest() {
      const gain = 25 + Math.floor(Math.random() * 10);
      state.energy = clamp(state.energy + gain);
      state.stress = clamp(state.stress - 15);
      addLog(`<p>Você descansa. A energia amaldiçoada se estabiliza. <span class="good">Energia +${gain}, Estresse -15</span>.</p>`);
      advanceSlot(); render();
    }

    function checkBurnout() {
      if (state.energy <= 5 && Math.random() < 0.3) {
        const dmg = 8 + Math.floor(Math.random() * 10);
        state.stats.forca = clamp(state.stats.forca - dmg);
        addLog(`<p class="danger">Exaustão. Seu corpo cede um pouco sob o esforço excessivo. -${dmg} Força.</p>`);
      }
    }

    function offerMission() {
      if (state.energy < 20) {
        addLog(`<p class="muted">Você está fraco demais para sair em missão agora. Descanse primeiro.</p>`);
        render();
        return;
      }
      const loc = MISSION_LOCATIONS[Math.floor(Math.random() * MISSION_LOCATIONS.length)];
      const gradeRoll = Math.random();
      const grade = gradeRoll > 0.92 ? 'Grau Especial' : gradeRoll > 0.7 ? 'Grau 1' : gradeRoll > 0.4 ? 'Grau 2' : 'Grau 3';
      state.pendingMission = { loc: loc.place, civilians: loc.civilians, grade };
      addLog(`<div class="mission-card"><div class="k">Missão recebida</div><p><b>${loc.place}</b></p><p class="k">Grau estimado: <b>${grade}</b> · Civis desaparecidos: <b>${loc.civilians}</b></p></div>`);
      render();
    }

    function gradeValue(grade) {
      return { 'Grau 3': 30, 'Grau 2': 50, 'Grau 1': 75, 'Grau Especial': 100 }[grade];
    }

    function prepareMission(mode) {
      const mission = state.pendingMission;
      let prepText = '';
      let riskMod = 0;
      let rewardMod = 1.0;
      let energyCost = 20;
      if (mode === 'investigar') {
        prepText = 'Você passa tempo reunindo informações antes de agir.'; riskMod = -15; rewardMod = 1.0; energyCost = 15;
      } else if (mode === 'direto') {
        prepText = 'Você vai direto ao local, sem preparação extra.'; riskMod = 0; rewardMod = 1.15; energyCost = 25;
      } else {
        prepText = 'Você pede apoio de um mentor antes de sair.'; riskMod = -25; rewardMod = 0.7; energyCost = 20;
      }
      state.energy = clamp(state.energy - energyCost);
      addLog(`<p>${prepText}</p>`);
      if (Math.random() < 0.35) {
        applyInjury(INJURY_TEMPLATES[2]);
      }
      const power = state.stats.reservas * 0.3 + state.stats.controle * 0.3 + state.stats.forca * 0.2 + state.stats.velocidade * 0.2;
      const enemy = gradeValue(mission.grade) + Math.floor(Math.random() * 20) + riskMod;
      const roll = power + Math.random() * 30 - state.stress * 0.15;
      if (mission.civilians > 0) {
        addLog(`<div class="btnrow"><button onclick="missionChoice('resgatar', ${roll}, ${enemy}, ${rewardMod})">Priorizar resgatar civis</button><button onclick="missionChoice('perseguir', ${roll}, ${enemy}, ${rewardMod})">Perseguir a maldição diretamente</button></div>`);
        render();
      } else {
        resolveMission(roll, enemy, rewardMod, false);
      }
    }

    function missionChoice(choice, roll, enemy, rewardMod) {
      const mission = state.pendingMission;
      if (choice === 'resgatar') {
        state.civiliansSaved += mission.civilians;
        addLog(`<p class="good">Você prioriza os civis. Todos são encontrados a salvo, mas a maldição ganha tempo.</p>`);
        resolveMission(roll - 10, enemy, rewardMod * 0.85, true);
      } else {
        addLog(`<p>Você ignora os gritos ao longe e vai direto atrás da maldição.</p>`);
        resolveMission(roll + 8, enemy, rewardMod, false);
      }
    }

    function resolveMission(roll, enemy, rewardMod, savedCivilians) {
      const mission = state.pendingMission;
      state.missionsCompleted += 1;
      if (roll > enemy + 10) {
        const gain = Math.round((3 + Math.random() * 4) * rewardMod);
        advanceInjuries();
        state.stats.resolucao = clamp(state.stats.resolucao + gain);
        state.gradesDefeated += 1;
        addLog(`<p class="good">Você exorciza a maldição de ${mission.grade} sem grandes dificuldades. Confiança cresce (+${gain} Resolução).</p>`);
      } else if (roll > enemy - 15) {
        const dmg = Math.round((8 + Math.random() * 15) / rewardMod);
        advanceInjuries();
        state.stats.forca = clamp(state.stats.forca - dmg);
        state.stress = clamp(state.stress + 10);
        state.gradesDefeated += 1;
        addLog(`<p>Combate difícil contra a maldição de ${mission.grade}. Você vence, mas sai ferido. <span class="danger">-${dmg} Força, Estresse +10</span>.</p>`);
      } else {
        const dmg = Math.round((25 + Math.random() * 30) / rewardMod);
        advanceInjuries();
        state.stats.forca = clamp(state.stats.forca - dmg);
        state.stress = clamp(state.stress + 20);
        addLog(`<p class="danger">A maldição de ${mission.grade} era mais forte do que o esperado. Você quase não escapa. -${dmg} Força, Estresse +20.</p>`);
        if (state.stats.forca <= 0) { state.causeOfDeath = `Morto em combate contra uma maldição de ${mission.grade} em ${mission.loc}.`; }
      }
      state.pendingMission = null;
      if (state.stats.forca <= 0 && !state.causeOfDeath) { state.causeOfDeath = 'Corpo destruído após ferimentos acumulados.'; }
      if (state.causeOfDeath) { handleDeath(); return; }
      advanceSlot(); checkBurnout();
      if (state.stats.forca <= 0 && !state.causeOfDeath) { state.causeOfDeath = 'Colapso físico.'; handleDeath(); return; }
      render();
    }

    function earnTitle() {
      const topMentor = Object.entries(state.mentorAffinity).sort((a, b) => b[1] - a[1])[0];
      if (topMentor && topMentor[1] >= 4) return `Aluno favorito de ${MENTORS[topMentor[0]].name}`;
      if (state.civiliansSaved >= 6) return 'Protetor do povo';
      if (state.gradesDefeated >= 8) return 'Exorcista prolífico';
      if (state.day <= 30 && !state.alive) return 'Prodígio caído cedo demais';
      return 'Feiticeiro sem título — vida comum, mas vivida';
    }

    function handleDeath() {
      state.alive = false;
      addLog(`<p class="danger"><b>${state.name}</b> não sobreviveu. ${state.causeOfDeath}</p>`);
      const highest = Math.max(...Object.values(state.stats));
      const title = earnTitle();
      addLegacy({ name: state.name, origin: ORIGINS[state.originKey].name, daysSurvived: state.day, highestStat: highest, cause: state.causeOfDeath, missions: state.missionsCompleted, civiliansSaved: state.civiliansSaved, title });
      clearRun();
      render();
    }

    async function startGame(name, originKey) {
      state = freshRun(name, originKey);
      addLog(`<p><b>${name}</b> é admitido(a) na Escola de Jujutsu, carregando a marca de <b>${ORIGINS[originKey].name}</b>.</p>`);
      dayMark();
      await saveRun();
      render();
    }

    function renderCreation() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <section class="screen">
          <header class="hero">
            <div class="titleblock">
              <h1>Jujutsu Sorcerer Life Simulator</h1>
              <div class="sub">Crie seu feiticeiro e viva uma vida de treino, rotina, missões e legado.</div>
            </div>
            <div class="seal">VIVA<b>AGORA</b></div>
          </header>
          <div class="brushed"></div>
          <div class="panel">
            <div class="formrow"><label>Nome</label><input type="text" id="nameInput" placeholder="Nome do seu feiticeiro" maxlength="24"></div>
            <div class="formrow"><label>Origem</label><div class="origin-grid" id="originGrid"></div></div>
            <div class="center">
              <button class="primary" id="beginBtn" disabled>Começar a vida</button>
              <button id="resetBtn" style="margin-left:8px;">Resetar progresso</button>
            </div>
          </div>
          <div class="panel">
            <h3>Registros Históricos</h3>
            <div id="legacyList" class="muted">Carregando...</div>
          </div>
        </section>
      `;

      let selectedOrigin = null;
      const grid = document.getElementById('originGrid');
      Object.entries(ORIGINS).forEach(([key, origin]) => {
        const card = document.createElement('div');
        card.className = 'origin-card';
        card.innerHTML = `<b>${origin.name}</b><span>${origin.desc}</span>`;
        card.onclick = () => {
          selectedOrigin = key;
          document.querySelectorAll('.origin-card').forEach((item) => item.classList.remove('selected'));
          card.classList.add('selected');
          checkReady();
        };
        grid.appendChild(card);
      });

      const nameInput = document.getElementById('nameInput');
      const beginBtn = document.getElementById('beginBtn');
      function checkReady() { beginBtn.disabled = !(nameInput.value.trim().length > 0 && selectedOrigin); }
      nameInput.addEventListener('input', checkReady);
      beginBtn.onclick = () => startGame(nameInput.value.trim(), selectedOrigin);

      const resetBtn = document.getElementById('resetBtn');
      if (resetBtn) {
        resetBtn.onclick = () => {
          clearRun();
          state = null;
          legacyList = [];
          loadLegacy().then((list) => {
            legacyList = list || [];
            render();
          });
        };
      }

      loadLegacy().then((list) => {
        legacyList = list || [];
        const el = document.getElementById('legacyList');
        if (legacyList.length === 0) {
          el.innerHTML = '<span class="muted">Nenhum feiticeiro entrou para a história ainda.</span>';
          return;
        }
        el.className = '';
        el.innerHTML = legacyList.map((item) => `
          <div class="legacy-item">
            <div class="name">${item.name} <span class="meta">— ${item.origin}</span></div>
            <div class="meta">"${item.title}" · ${item.daysSurvived} dia(s) · ${item.missions || 0} missões · ${item.civiliansSaved || 0} civis salvos · ${item.cause}</div>
          </div>
        `).join('');
      });
    }

    function statRow(label, key, fillClass) {
      return `
        <div class="stat-row">
          <div class="top"><span>${label}</span><b>${state.stats[key]}</b></div>
          <div class="bar"><div class="${fillClass}" style="width:${state.stats[key]}%"></div></div>
        </div>
      `;
    }

    function renderGame() {
      const app = document.getElementById('app');
      const slotNames = ['Manhã', 'Tarde', 'Noite'];
      const inMission = !!state.pendingMission;
      app.innerHTML = `
        <section class="screen">
          <header class="hero">
            <div class="titleblock">
              <h1>${state.name}</h1>
              <div class="sub">${ORIGINS[state.originKey].name} · Dia ${state.day}, ${slotNames[state.slot]}</div>
              <div class="pill">⚔️ ${state.gradesDefeated} maldições enfrentadas · 🛡️ ${state.civiliansSaved} civis salvos</div>
            </div>
            <div class="seal">DIA<b>${state.day}</b></div>
          </header>
          <div class="grid">
            <div class="panel">
              <h3>Atributos</h3>
              <div class="stat-group-label">Físico</div>
              ${statRow('Força', 'forca', 'fill-red')}
              ${statRow('Velocidade', 'velocidade', 'fill-red')}
              <div class="stat-group-label">Jujutsu</div>
              ${statRow('Reservas de EA', 'reservas', 'fill-purple')}
              ${statRow('Controle de EA', 'controle', 'fill-purple')}
              <div class="stat-group-label">Mental</div>
              ${statRow('Intelecto', 'intelecto', 'fill-teal')}
              ${statRow('Resolução', 'resolucao', 'fill-teal')}
              <div class="stat-group-label">Estado</div>
              <div class="stat-row">
                <div class="top"><span>Energia</span><b>${state.energy}</b></div>
                <div class="bar"><div class="fill-teal" style="width:${state.energy}%"></div></div>
              </div>
              <div class="stat-row">
                <div class="top"><span>Saúde</span><b>${state.health}</b></div>
                <div class="bar"><div class="fill-red" style="width:${state.health}%"></div></div>
              </div>
              <div class="stat-row">
                <div class="top"><span>Estresse</span><b>${state.stress}</b></div>
                <div class="bar"><div class="fill-gold" style="width:${state.stress}%"></div></div>
              </div>
              ${state.injuries && state.injuries.length > 0 ? `<div class="pill">🩹 Lesões ativas: ${state.injuries.map((injury) => injury.name).join(', ')}</div>` : ''}
            </div>
            <div>
              <div class="log" id="log">${state.log.join('')}</div>
              <div class="actions">
                ${inMission ? renderMissionPrep() : renderNormalActions(slotNames)}
              </div>
            </div>
          </div>
        </section>
      `;
      const log = document.getElementById('log');
      log.scrollTop = log.scrollHeight;
      saveRun();
      syncStore();
    }

    function renderMissionPrep() {
      return `
        <div class="slot-label">Preparação da missão</div>
        <div class="btnrow">
          <button onclick="prepareMission('investigar')">Investigar antes</button>
          <button onclick="prepareMission('direto')">Ir direto</button>
          <button onclick="prepareMission('mentor')">Pedir apoio do mentor</button>
        </div>
      `;
    }

    function renderNormalActions(slotNames) {
      const isMorning = state.slot === 0;
      return `
        <div class="slot-label">Ação — ${slotNames[state.slot]}</div>
        <div class="btnrow">
          ${isMorning ? '<button onclick="doClass()">Ir à aula</button>' : ''}
          <button onclick="doTrain('forca')">Reforço Físico</button>
          <button onclick="doTrain('velocidade')">Treino de Reação</button>
          <button onclick="doTrain('reservas')">Meditação de EA</button>
          <button onclick="doTrain('controle')">Controle de EA</button>
          <button onclick="doTrain('intelecto')">Estudo Teórico</button>
          <button onclick="doMentorSession()">Sessão com Mentor</button>
          <button onclick="doRest()">Descansar</button>
          ${state.slot === 1 ? '<button class="danger" onclick="offerMission()">Ir em missão</button>' : ''}
        </div>
      `;
    }

    function renderDeath() {
      const app = document.getElementById('app');
      const highest = Math.max(...Object.values(state.stats));
      const title = earnTitle();
      app.innerHTML = `
        <section class="screen">
          <header class="hero">
            <div class="titleblock">
              <h1>${state.name}</h1>
              <div class="sub">Fim de vida — Dia ${state.day}</div>
            </div>
            <div class="seal" style="border-color:var(--red); color:var(--red);">☠<b style="font-size:14px">FIM</b></div>
          </header>
          <div class="panel">
            <h3>Resumo do Legado</h3>
            <p><b>Título:</b> "${title}"</p>
            <p><b>Origem:</b> ${ORIGINS[state.originKey].name}</p>
            <p><b>Dias vividos:</b> ${state.day}</p>
            <p><b>Missões completadas:</b> ${state.missionsCompleted}</p>
            <p><b>Civis salvos:</b> ${state.civiliansSaved}</p>
            <p><b>Pico de atributo:</b> ${highest}</p>
            <p><b>Causa da morte:</b> ${state.causeOfDeath}</p>
          </div>
          <div class="center">
            <button class="primary" onclick="location.reload()">Começar uma nova vida</button>
            <button style="margin-left:8px;" onclick="state=null; clearRun(); render();">Resetar partida</button>
          </div>
        </section>
      `;
      syncStore();
    }

    function render() {
      if (!state) {
        renderCreation();
        return;
      }
      if (!state.alive) {
        renderDeath();
        return;
      }
      renderGame();
    }

    (async function init() {
      legacyList = (await loadLegacy()) || [];
      const existing = await loadRun();
      if (existing && existing.alive) {
        state = existing;
      }
      syncStore();
      render();
    })();
  </script>
</body>
</html>
